name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build, Test & Lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      # Pin to 1.91 until winit 0.30 is compatible with Rust 1.92+
      # (https://github.com/rust-windowing/winit/issues/4486)
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev \
            libwayland-dev libx11-dev libx11-xcb-dev libxcursor-dev libxext-dev libxfixes-dev \
            libxft-dev libxi-dev libxinerama-dev libxmu-dev libxrandr-dev libxrender-dev \
            libxss-dev libxt-dev libxtst-dev libxxf86vm-dev libgl1-mesa-dev libegl1-mesa-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --workspace --exclude murmur-copilot --all-targets

      - name: Test
        run: cargo test --workspace --exclude murmur-copilot -- --test-threads=1

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --exclude murmur-copilot --all-targets -- -D warnings

  pages:
    name: Validate GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check docs/index.html exists
        run: test -f docs/index.html

      - name: Validate HTML
        run: |
          # Ensure the file is valid HTML (has doctype and basic structure)
          head -1 docs/index.html | grep -qi '<!doctype html>'

      - name: Reject gitlink entries
        run: |
          # Gitlinks (mode 160000) without .gitmodules break GitHub Pages
          if git ls-tree -r HEAD | grep -q '^160000'; then
            echo "::error::Found gitlink entries (mode 160000) that will break GitHub Pages:"
            git ls-tree -r HEAD | grep '^160000'
            echo "Remove with: git rm --cached <path>"
            exit 1
          fi

      - name: Check .nojekyll exists
        run: test -f docs/.nojekyll
