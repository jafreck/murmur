name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Code Coverage
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      # Pin to 1.91 until winit 0.30 is compatible with Rust 1.92+
      # (https://github.com/rust-windowing/winit/issues/4486)
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --exclude murmur-copilot --summary-only --fail-under-lines 64 --ignore-filename-regex '(native|linux)_icon_cache\.rs|inserter\.rs' -- --test-threads=1

      - name: Generate coverage report
        if: always()
        run: cargo llvm-cov --workspace --exclude murmur-copilot --summary-only -- --test-threads=1
