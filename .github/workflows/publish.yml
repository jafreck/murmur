name: Publish

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test -- --test-threads=1

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            features: metal
            artifact: murmur-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            features: ""
            artifact: murmur-darwin-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: ""
            artifact: murmur-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: ""
            artifact: murmur-windows-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features && format('--features {0}', matrix.features) }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/murmur ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\murmur.exe ${{ matrix.artifact }}.exe
          Compress-Archive -Path ${{ matrix.artifact }}.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.exe

  upload-installers:
    name: Upload install scripts
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - name: Upload install scripts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/install.sh
            scripts/install.ps1
            scripts/uninstall.sh
            scripts/uninstall.ps1

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Dry-run publish
        run: cargo publish --dry-run

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone tap repository
        run: git clone git@github.com:jafreck/homebrew-murmur.git tap
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/tap_key"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo jafreck/murmur \
            --pattern "murmur-darwin-arm64.tar.gz" \
            --pattern "murmur-darwin-x86_64.tar.gz" \
            --pattern "murmur-linux-x86_64.tar.gz"

      - name: Update formula version and checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_ARM64=$(sha256sum murmur-darwin-arm64.tar.gz | cut -d ' ' -f1)
          SHA_X86_64=$(sha256sum murmur-darwin-x86_64.tar.gz | cut -d ' ' -f1)
          SHA_LINUX=$(sha256sum murmur-linux-x86_64.tar.gz | cut -d ' ' -f1)

          python3 <<PYEOF
          with open("tap/Formula/murmur.rb") as f:
              lines = f.readlines()

          shas = ["${SHA_ARM64}", "${SHA_X86_64}", "${SHA_LINUX}"]
          sha_idx = 0
          for i, line in enumerate(lines):
              if 'version "' in line:
                  indent = line[:len(line) - len(line.lstrip())]
                  lines[i] = f'{indent}version "${VERSION}"\n'
              elif 'sha256 "' in line and sha_idx < len(shas):
                  indent = line[:len(line) - len(line.lstrip())]
                  lines[i] = f'{indent}sha256 "{shas[sha_idx]}"\n'
                  sha_idx += 1

          with open("tap/Formula/murmur.rb", "w") as f:
              f.writelines(lines)
          PYEOF

      - name: Commit and push formula update
        working-directory: tap
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/tap_key"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/murmur.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "murmur ${{ github.event.release.tag_name }}"
          git push origin main

