<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Murmur Copilot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="controls">
      <button id="btn-start" class="btn btn-start">Start Meeting</button>
      <button id="btn-stop" class="btn btn-stop" disabled>Stop Meeting</button>
      <button id="btn-stealth" class="btn btn-stealth">👁 Stealth: OFF</button>
      <span id="status" class="status">idle</span>
    </header>
    <div class="settings">
      <label for="device-select" class="device-label">System Audio:</label>
      <select id="device-select" class="device-select">
        <option value="">None (mic only)</option>
      </select>
    </div>
    <main id="transcript" class="transcript"></main>
  </div>
  <script src="main.ts" type="module"></script>
</body>
</html>
